<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Timelogg">
<meta name="theme-color" content="#2e6da4">
<title>Timelogg</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-dark:#1e4f7a; --blue:#2e6da4; --blue-mid:#3a7fc1;
    --blue-light:#d6e8f7; --blue-pale:#eaf3fb; --teal:#2a9d8f;
    --bg:#f0f2f5; --surface:#fff; --surface2:#f5f7fa; --surface3:#eaecf0;
    --border:#d0d8e4; --border2:#b8c4d4;
    --text:#1a2a3a; --text2:#4a6070; --text3:#8a9aaa;
    --red:#c0392b; --red-dim:#fdecea;
    --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif;
    --r:6px; --rl:10px;
    --safe-bottom:env(safe-area-inset-bottom,0px);
    --safe-top:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100%;padding:0 0 calc(80px + var(--safe-bottom))}

  /* topbar */
  .topbar{background:var(--blue);padding:calc(12px + var(--safe-top)) 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .app-title{font-size:16px;font-weight:500;color:#fff;letter-spacing:.01em}
  .header-actions{display:flex;gap:8px}
  .ghost-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:var(--r);padding:7px 12px;font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;min-height:36px;transition:background .15s}
  .ghost-btn:active{background:rgba(255,255,255,.28)}
  .ghost-btn svg{width:13px;height:13px;flex-shrink:0}

  /* layout */
  .content{max-width:680px;margin:0 auto;padding:16px 16px 0}

  /* day nav */
  .day-nav{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:4px;margin-bottom:12px;box-shadow:0 1px 3px rgba(46,109,164,.07)}
  .day-arrow{background:transparent;border:none;color:var(--text2);cursor:pointer;width:44px;height:44px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s,color .12s}
  .day-arrow:active{background:var(--blue-pale);color:var(--blue)}
  .day-arrow svg{width:18px;height:18px}
  .day-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;border-radius:var(--r);position:relative;transition:background .12s}
  .day-center:active{background:var(--blue-pale)}
  .day-name{font-size:15px;font-weight:500;color:var(--text)}
  .day-date{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.04em}
  #date-picker{position:absolute;opacity:0;inset:0;width:100%;height:100%;cursor:pointer;border:none;font-size:16px}

  /* progress */
  .progress-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--blue);border-radius:var(--rl);padding:16px 20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(46,109,164,.07)}
  .progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .progress-left{display:flex;align-items:baseline;gap:6px}
  .hours-big{font-family:var(--mono);font-size:34px;font-weight:400;color:var(--blue);letter-spacing:-.03em;line-height:1}
  .hours-big.over{color:var(--red)}
  .hours-unit{font-family:var(--mono);font-size:13px;color:var(--text3)}
  .progress-right{display:flex;align-items:center;gap:6px}
  .target-label{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
  .target-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:6px 8px;font-family:var(--mono);font-size:13px;color:var(--text);width:60px;text-align:center;outline:none;min-height:36px;transition:border-color .15s,box-shadow .15s}
  .target-input:focus{border-color:var(--blue-mid);box-shadow:0 0 0 2px var(--blue-light)}
  .progress-track{height:6px;background:var(--surface3);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;background:var(--blue);border-radius:99px;transition:width .4s cubic-bezier(.34,1.1,.64,1)}
  .progress-fill.over{background:var(--red)}
  .progress-meta{display:flex;justify-content:space-between;margin-top:6px}
  .progress-pct{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.04em}
  .progress-remaining{font-family:var(--mono);font-size:11px;color:var(--teal);letter-spacing:.04em}
  .progress-remaining.over-text{color:var(--red)}

  /* add form */
  .add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:16px;box-shadow:0 1px 3px rgba(46,109,164,.07)}
  .form-fields{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
  .form-row-two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .field-wrap{display:flex;flex-direction:column;gap:3px;position:relative}
  .field-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding-left:2px}
  .form-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-family:var(--sans);font-size:16px;color:var(--text);outline:none;width:100%;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
  .form-input::placeholder{color:var(--text3);font-size:14px}
  .form-input:focus{border-color:var(--blue-mid);box-shadow:0 0 0 2px var(--blue-light);background:#fff}
  .form-input.hours-inp{font-family:var(--mono);text-align:right}
  .form-submit{width:100%;background:var(--blue);border:none;border-radius:var(--r);padding:13px 0;font-family:var(--sans);font-size:14px;font-weight:500;color:#fff;cursor:pointer;min-height:46px;transition:background .12s,transform .1s}
  .form-submit:active{background:var(--blue-dark);transform:scale(.99)}

  /* ordrelinje lookup dropdown */
  .lookup-wrap{position:relative}
  .lookup-dropdown{
    position:absolute;top:calc(100% + 3px);left:0;right:0;
    background:var(--surface);border:1px solid var(--border2);
    border-radius:var(--r);z-index:200;
    box-shadow:0 4px 12px rgba(0,0,0,.12);
    max-height:220px;overflow-y:auto;
    display:none;
  }
  .lookup-dropdown.open{display:block}
  .lookup-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:9px 12px;cursor:pointer;gap:8px;
    font-size:14px;color:var(--text);
    border-bottom:1px solid var(--border);
    transition:background .1s;
  }
  .lookup-item:last-child{border-bottom:none}
  .lookup-item:hover,.lookup-item.active{background:var(--blue-pale)}
  .lookup-item-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lookup-del{
    background:transparent;border:none;cursor:pointer;
    color:var(--text3);padding:2px 4px;border-radius:4px;
    font-size:14px;line-height:1;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:background .1s,color .1s;
  }
  .lookup-del:hover{background:var(--red-dim);color:var(--red)}
  .lookup-empty{padding:10px 12px;font-size:13px;color:var(--text3);font-style:italic}

  /* entries */
  .entries-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px;margin-bottom:6px}
  .section-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
  .sort-btn{background:transparent;border:1px solid var(--border);border-radius:var(--r);padding:4px 10px;font-family:var(--mono);font-size:10px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;letter-spacing:.06em;transition:background .12s,color .12s,border-color .12s}
  .sort-btn:hover,.sort-btn.active{background:var(--blue-pale);border-color:var(--blue-light);color:var(--blue)}
  .sort-arrow{font-size:10px;display:inline-block;transition:transform .2s}
  .entries-list{display:flex;flex-direction:column;gap:4px}
  .entry-row{display:grid;grid-template-columns:minmax(0,1fr) 68px 40px;align-items:center;gap:8px;padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--blue-light);border-radius:var(--r);animation:slideIn .15s ease;transition:border-left-color .15s}
  .entry-row:active{border-left-color:var(--blue)}
  @keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .entry-info{min-width:0}
  .entry-desc{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
  .entry-order{font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .entry-hours{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--blue);text-align:right;white-space:nowrap}
  .del-btn{background:transparent;border:none;cursor:pointer;color:var(--text3);width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;transition:all .12s;margin-left:auto}
  .del-btn:active{background:var(--red-dim);color:var(--red)}
  .del-btn svg{width:13px;height:13px}
  .empty-state{padding:40px 0;text-align:center;font-size:13px;color:var(--text3);border:1px dashed var(--border);border-radius:var(--rl);background:var(--surface)}
  .entry-row.selected{border-left-color:var(--blue);background:var(--blue-pale)}
  .entry-row-hint{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:center;padding:6px 0;letter-spacing:.04em}

  /* toast */
  .toast{position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:var(--blue-dark);border-radius:var(--r);padding:10px 20px;font-family:var(--mono);font-size:12px;color:#fff;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:999}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* wide */
  @media(min-width:540px){
    .form-fields{flex-direction:row;align-items:flex-end}
    .field-wrap.desc{flex:1}
    .form-row-two{display:contents}
    .field-wrap.order{width:160px;flex-shrink:0}
    .field-wrap.hours{width:100px;flex-shrink:0}
    .entries-list .entry-row{grid-template-columns:minmax(0,1fr) minmax(0,150px) 68px 40px}
  }

  /* login overlay */
  .login-overlay{position:fixed;inset:0;background:var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:20px}
  .login-box{background:#fff;border-radius:var(--rl);padding:32px 28px;width:100%;max-width:360px}
  .login-title{font-size:18px;font-weight:500;color:var(--text);margin-bottom:4px}
  .login-sub{font-size:13px;color:var(--text3);margin-bottom:24px}

  .login-btn{width:100%;background:var(--blue);border:none;border-radius:var(--r);padding:13px 0;font-size:14px;font-weight:500;color:#fff;cursor:pointer;transition:background .12s;margin-top:4px}
  .login-btn:active{background:var(--blue-dark)}
  .login-user{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.7);letter-spacing:.04em}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#2a9d8f;display:inline-block;margin-right:5px;flex-shrink:0}
  .sync-dot.syncing{background:#e07b2a;animation:pulse .8s infinite}
  .sync-dot.error{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .sync-wrap{display:flex;align-items:center;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.04em}
</style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-title">Timelogg</div>
    <div class="login-sub">Logg inn for å fortsette</div>
    <button class="login-btn" id="login-btn">Logg inn / Registrer</button>
  </div>
</div>

<div class="topbar">
  <div style="display:flex;flex-direction:column;gap:2px">
    <span class="app-title">Timelogg</span>
    <div class="sync-wrap"><span class="sync-dot" id="sync-dot"></span><span id="sync-label">synkronisert</span></div>
  </div>
  <div class="header-actions">
    <button class="ghost-btn" id="btn-export-excel">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3h10v10H3zM3 8h10M8 3v10"/></svg>
      Excel
    </button>
    <button class="ghost-btn" id="btn-export">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>
      JSON
    </button>
    <button class="ghost-btn" id="btn-import-trigger">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10V2M5 5l3-3 3 3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>
      Importer
    </button>
    <button class="ghost-btn" id="btn-logout">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3H3v10h3M11 5l3 3-3 3M14 8H7"/></svg>
      Logg ut
    </button>
    <input type="file" id="file-input" accept=".json" style="display:none">
  </div>
</div>

<div class="content">
  <nav class="day-nav" style="margin-top:16px">
    <button class="day-arrow" id="prev-day">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 12L6 8l4-4"/></svg>
    </button>
    <div class="day-center">
      <span class="day-name" id="day-name"></span>
      <span class="day-date" id="day-date"></span>
      <input type="date" id="date-picker">
    </div>
    <button class="day-arrow" id="next-day">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 12l4-4-4-4"/></svg>
    </button>
  </nav>

  <div class="progress-card">
    <div class="progress-top">
      <div class="progress-left">
        <span class="hours-big" id="hours-done">0t</span>
        <span class="hours-unit">/ <span id="hours-target">7,5</span>t</span>
      </div>
      <div class="progress-right">
        <span class="target-label">Mål</span>
        <input class="target-input" type="number" id="inp-target" min="1" max="24" step="0.25" value="7.5" inputmode="decimal">
        <span class="target-label">t</span>
      </div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="progress-meta">
      <span class="progress-pct" id="prog-pct">0%</span>
      <span class="progress-remaining" id="prog-remaining"></span>
    </div>
  </div>

  <div class="add-form" id="add-form-el">
    <div class="form-fields">
      <div class="field-wrap desc">
        <span class="field-label">Beskrivelse</span>
        <input class="form-input" type="text" id="inp-desc" placeholder="Hva jobbet du med?" autocomplete="off" autocorrect="off">
      </div>
      <div class="form-row-two">
        <div class="field-wrap order lookup-wrap">
          <span class="field-label">Ordrelinje</span>
          <input class="form-input" type="text" id="inp-order" placeholder="Ordrelinje" autocomplete="off" autocorrect="off" autocapitalize="off">
          <div class="lookup-dropdown" id="lookup-dropdown"></div>
        </div>
        <div class="field-wrap hours">
          <span class="field-label">Timer</span>
          <input class="form-input hours-inp" type="text" id="inp-hours" placeholder="0,00" inputmode="decimal">
        </div>
      </div>
    </div>
    <button class="form-submit" id="btn-add">Legg til</button>
  </div>

  <div class="entries-header">
    <span class="section-label" id="entries-label"></span>
    <button class="sort-btn" id="sort-btn" style="display:none">
      Ordrelinje <span class="sort-arrow" id="sort-arrow">&#9650;</span>
    </button>
  </div>
  <div class="entries-list" id="entries-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='timelogg_v1',KEY_LOOKUP='timelogg_lookup',AUTO_KEY='timelogg_last_export',AUTO_DAY_KEY='timelogg_last_export_day';
let currentDay=new Date().toISOString().slice(0,10),data={},lookupList=[],sortOrder=null,editingIndex=null,currentUser=null,syncTimeout=null;
try{data=JSON.parse(localStorage.getItem(KEY))||{};}catch(e){}
try{lookupList=JSON.parse(localStorage.getItem(KEY_LOOKUP))||[];}catch(e){}

const isWide=()=>window.innerWidth>=540;
function save(){localStorage.setItem(KEY,JSON.stringify(data));}
function saveLookup(){localStorage.setItem(KEY_LOOKUP,JSON.stringify(lookupList));}
function addToLookup(val){if(!val)return;const v=val.trim();if(!v||lookupList.includes(v))return;lookupList.unshift(v);saveLookup();}
function removeFromLookup(val){lookupList=lookupList.filter(x=>x!==val);saveLookup();}
function dayData(d){if(!data[d])data[d]={target:7.5,entries:[]};return data[d];}
function parseHours(str){return parseFloat(String(str).replace(',','.'));}
function fmtH(h){return parseFloat(h.toFixed(2)).toString().replace('.',',');}
function fmtLabel(str){
  const d=new Date(str+'T12:00:00');
  const today=new Date().toISOString().slice(0,10);
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const name=str===today?'I dag':str===yesterday?'I går':d.toLocaleDateString('nb-NO',{weekday:'long'});
  const date=d.toLocaleDateString('nb-NO',{day:'numeric',month:'long',year:'numeric'});
  return{name:name.charAt(0).toUpperCase()+name.slice(1),date};
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function totalEntries(){return Object.values(data).reduce((s,d)=>s+(d.entries?d.entries.length:0),0);}

// ── Sync status ──
function setSyncStatus(status,label){
  const dot=document.getElementById('sync-dot'),lbl=document.getElementById('sync-label');
  dot.className='sync-dot'+(status==='syncing'?' syncing':status==='error'?' error':'');
  lbl.textContent=label;
}

// ── Blobs ──
async function getToken(){
  const user=netlifyIdentity.currentUser();
  if(!user)return null;
  try{await user.jwt(true);return user.token.access_token;}catch(e){return null;}
}

async function loadFromBlobs(){
  const token=await getToken();if(!token)return;
  setSyncStatus('syncing','laster...');
  try{
    const res=await fetch('/api/blobs',{headers:{Authorization:'Bearer '+token}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const remote=await res.json();
    if(remote.timelogg&&Object.keys(remote.timelogg).length>0){data=remote.timelogg;save();}
    if(Array.isArray(remote.lookup)&&remote.lookup.length>0){lookupList=[...new Set([...remote.lookup,...lookupList])];saveLookup();}
    setSyncStatus('ok','synkronisert');render();
  }catch(e){setSyncStatus('error','feil ved lasting');console.error(e);}
}

async function saveToBlobs(){
  const token=await getToken();if(!token)return;
  setSyncStatus('syncing','lagrer...');
  try{
    const res=await fetch('/api/blobs',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({timelogg:data,lookup:lookupList})});
    if(!res.ok)throw new Error('HTTP '+res.status);
    setSyncStatus('ok','synkronisert');
  }catch(e){setSyncStatus('error','feil ved lagring');console.error(e);}
}

function debouncedSave(){save();if(!currentUser)return;clearTimeout(syncTimeout);syncTimeout=setTimeout(saveToBlobs,1500);}

// ── Identity ──
function showApp(user){
  currentUser=user;
  document.getElementById('login-overlay').style.display='none';
  loadFromBlobs();
}
function showLogin(){
  currentUser=null;
  document.getElementById('login-overlay').style.display='flex';
}

async function getToken(){
  const user=netlifyIdentity.currentUser();
  if(!user)return null;
  try{await user.jwt(true);return user.token.access_token;}catch(e){return null;}
}

netlifyIdentity.on('init', user => { if(user) showApp(user); else showLogin(); });
netlifyIdentity.on('login', user => { netlifyIdentity.close(); showApp(user); showToast('Logget inn som '+user.email); });
netlifyIdentity.on('logout', () => { showLogin(); showToast('Logget ut'); });
netlifyIdentity.init({ APIUrl: 'https://timelogg1.netlify.app/.netlify/identity' });

document.getElementById('login-btn').addEventListener('click', () => netlifyIdentity.open());
document.getElementById('btn-logout').addEventListener('click', () => netlifyIdentity.logout());

// ── Lookup ──
const inpOrder=document.getElementById('inp-order');
const dropdown=document.getElementById('lookup-dropdown');
let activeIdx=-1;

function renderDropdown(filter){
  const q=(filter||'').toLowerCase().trim();
  const matches=lookupList.filter(x=>!q||x.toLowerCase().includes(q));
  dropdown.innerHTML='';activeIdx=-1;
  if(matches.length===0){
    if(q){const em=document.createElement('div');em.className='lookup-empty';em.textContent='Ingen treff';dropdown.appendChild(em);}
    dropdown.classList.toggle('open',!!q&&lookupList.length>0);return;
  }
  matches.forEach(val=>{
    const item=document.createElement('div');
    item.className='lookup-item';item.dataset.val=val;item.title=val;
    item.innerHTML=`<span class="lookup-item-text">${val}</span>
      <button class="lookup-del" data-val="${val}" tabindex="-1" title="Slett fra liste">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4l8 8M12 4l-8 8"/></svg>
      </button>`;
    item.addEventListener('mousedown',e=>{if(e.target.closest('.lookup-del'))return;e.preventDefault();inpOrder.value=val;closeDropdown();});
    item.querySelector('.lookup-del').addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();removeFromLookup(val);renderDropdown(inpOrder.value);});
    dropdown.appendChild(item);
  });
  dropdown.classList.add('open');
}
function closeDropdown(){dropdown.classList.remove('open');activeIdx=-1;}
inpOrder.addEventListener('focus',()=>renderDropdown(inpOrder.value));
inpOrder.addEventListener('input',()=>renderDropdown(inpOrder.value));
inpOrder.addEventListener('keydown',e=>{
  const items=dropdown.querySelectorAll('.lookup-item');
  if(!dropdown.classList.contains('open')||items.length===0)return;
  if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));if(activeIdx>=0)inpOrder.value=items[activeIdx].dataset.val;}
  else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,-1);items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));if(activeIdx>=0)inpOrder.value=items[activeIdx].dataset.val;}
  else if(e.key==='Escape')closeDropdown();
});

document.addEventListener('mousedown',e=>{
  if(!e.target.closest('.lookup-wrap'))closeDropdown();
  if(editingIndex!==null&&!e.target.closest('#add-form-el')&&!e.target.closest('.entries-list')){cancelEdit();render();}
});

// ── Render ──
function render(){
  const dd=dayData(currentDay),lbl=fmtLabel(currentDay),wide=isWide();
  document.getElementById('day-name').textContent=lbl.name;
  document.getElementById('day-date').textContent=lbl.date;
  document.getElementById('date-picker').value=currentDay;
  document.getElementById('inp-target').value=dd.target;
  document.getElementById('hours-target').textContent=fmtH(dd.target);
  const total=dd.entries.reduce((s,e)=>s+e.hours,0);
  const pct=dd.target>0?(total/dd.target)*100:0;
  const remaining=dd.target-total;
  const hoursDone=document.getElementById('hours-done');
  hoursDone.textContent=fmtH(total)+'t';
  hoursDone.classList.toggle('over',total>dd.target);
  const fill=document.getElementById('prog-fill');
  fill.style.width=Math.min(pct,100).toFixed(1)+'%';
  fill.classList.toggle('over',total>dd.target);
  document.getElementById('prog-pct').textContent=pct.toFixed(0)+'%';
  const remEl=document.getElementById('prog-remaining');
  if(remaining>0.01){remEl.textContent=fmtH(remaining)+'t gjenstår';remEl.className='progress-remaining';}
  else if(remaining<-0.01){remEl.textContent='+'+fmtH(Math.abs(remaining))+'t over';remEl.className='progress-remaining over-text';}
  else{remEl.textContent='Mål nådd';remEl.className='progress-remaining';}
  const list=document.getElementById('entries-list'),lbl2=document.getElementById('entries-label');
  list.innerHTML='';
  if(dd.entries.length===0){lbl2.textContent='';document.getElementById('sort-btn').style.display='none';list.innerHTML='<div class="empty-state">Ingen timer ført denne dagen</div>';return;}
  lbl2.textContent=dd.entries.length+(dd.entries.length===1?' oppføring':' oppføringer');
  const sortBtn=document.getElementById('sort-btn'),sortArrow=document.getElementById('sort-arrow');
  sortBtn.style.display='';sortBtn.classList.toggle('active',sortOrder!==null);
  sortArrow.innerHTML=sortOrder==='desc'?'&#9660;':sortOrder==='asc'?'&#9650;':'&#8645;';
  let entries=dd.entries.map((e,i)=>({...e,_i:i}));
  if(sortOrder==='asc')entries.sort((a,b)=>(a.order||'').localeCompare(b.order||'','nb'));
  else if(sortOrder==='desc')entries.sort((a,b)=>(b.order||'').localeCompare(a.order||'','nb'));
  entries.forEach(e=>{
    const i=e._i,row=document.createElement('div');
    row.className='entry-row'+(editingIndex===i?' selected':'');
    row.style.cursor='pointer';
    if(wide){
      row.style.gridTemplateColumns='minmax(0,1fr) minmax(0,150px) 68px 40px';
      row.innerHTML=`<span class="entry-desc" title="${e.desc}">${e.desc}</span>
        <span class="entry-order">${e.order||'—'}</span>
        <span class="entry-hours">${fmtH(e.hours)}t</span>
        <button class="del-btn" data-i="${i}"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l8 8M12 4l-8 8"/></svg></button>`;
    }else{
      row.innerHTML=`<div class="entry-info"><div class="entry-desc">${e.desc}</div>${e.order?'<div class="entry-order">'+e.order+'</div>':''}</div>
        <span class="entry-hours">${fmtH(e.hours)}t</span>
        <button class="del-btn" data-i="${i}"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l8 8M12 4l-8 8"/></svg></button>`;
    }
    row.addEventListener('click',ev=>{
      if(ev.target.closest('.del-btn'))return;
      editingIndex=i;
      const entry=dayData(currentDay).entries[i];
      document.getElementById('inp-desc').value=entry.desc;
      inpOrder.value=entry.order||'';
      document.getElementById('inp-hours').value=fmtH(entry.hours);
      document.getElementById('btn-add').textContent='Lagre';
      document.getElementById('inp-desc').focus();
      document.getElementById('add-form-el').scrollIntoView({behavior:'smooth',block:'nearest'});
      render();
    });
    list.appendChild(row);
  });
  if(dd.entries.length>0){const hint=document.createElement('div');hint.className='entry-row-hint';hint.textContent='Klikk på en rad for å redigere';list.appendChild(hint);}
  list.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx=parseInt(btn.dataset.i);
      dayData(currentDay).entries.splice(idx,1);
      if(editingIndex===idx)cancelEdit();
      debouncedSave();render();
    });
  });
}

// ── Add/Save/Cancel ──
function cancelEdit(){editingIndex=null;document.getElementById('inp-desc').value='';inpOrder.value='';document.getElementById('inp-hours').value='';document.getElementById('btn-add').textContent='Legg til';closeDropdown();}

function addEntry(){
  const desc=document.getElementById('inp-desc').value.trim(),order=inpOrder.value.trim(),hours=parseHours(document.getElementById('inp-hours').value);
  if(!desc||isNaN(hours)||hours<=0){document.getElementById('inp-desc').focus();return;}
  addToLookup(order);
  if(editingIndex!==null)dayData(currentDay).entries[editingIndex]={desc,order,hours};
  else dayData(currentDay).entries.push({desc,order,hours});
  debouncedSave();cancelEdit();render();
}

document.getElementById('btn-add').addEventListener('click',addEntry);
['inp-desc','inp-hours'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown',e=>{
    if(e.key==='Enter')addEntry();
    if(e.key==='Escape'&&editingIndex!==null){cancelEdit();render();}
  });
});
inpOrder.addEventListener('keydown',e=>{
  if(e.key==='Enter'){if(dropdown.classList.contains('open')&&activeIdx>=0){closeDropdown();document.getElementById('inp-hours').focus();}else{closeDropdown();addEntry();}}
});

document.getElementById('inp-target').addEventListener('change',()=>{
  const t=parseHours(document.getElementById('inp-target').value);
  if(!isNaN(t)&&t>0){dayData(currentDay).target=t;debouncedSave();render();}
});

document.getElementById('prev-day').addEventListener('click',()=>{const d=new Date(currentDay+'T12:00:00');d.setDate(d.getDate()-1);currentDay=d.toISOString().slice(0,10);render();});
document.getElementById('next-day').addEventListener('click',()=>{const d=new Date(currentDay+'T12:00:00');d.setDate(d.getDate()+1);currentDay=d.toISOString().slice(0,10);render();});
document.getElementById('date-picker').addEventListener('change',e=>{if(e.target.value){currentDay=e.target.value;render();}});
document.getElementById('sort-btn').addEventListener('click',()=>{if(sortOrder===null)sortOrder='asc';else if(sortOrder==='asc')sortOrder='desc';else sortOrder=null;render();});

// ── Export JSON ──
function downloadBlob(filename,content,type){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}

document.getElementById('btn-export').addEventListener('click',()=>{
  downloadBlob('timelogg.json',JSON.stringify({timelogg:data,lookup:lookupList},null,2),'application/json');
  showToast('Eksportert til timelogg.json');
});

// ── Export Excel ──
document.getElementById('btn-export-excel').addEventListener('click',()=>{
  const rows=[['Dato','Ukedag','Beskrivelse','Ordrelinje','Timer']];
  Object.keys(data).sort().forEach(day=>{
    const dd=data[day];
    if(!dd.entries||dd.entries.length===0)return;
    const d=new Date(day+'T12:00:00');
    const ukedag=d.toLocaleDateString('nb-NO',{weekday:'long'});
    dd.entries.forEach(e=>{rows.push([day,ukedag.charAt(0).toUpperCase()+ukedag.slice(1),e.desc,e.order||'',e.hours]);});
    const total=dd.entries.reduce((s,e)=>s+e.hours,0);
    rows.push(['','','','Sum',parseFloat(total.toFixed(2))]);
    rows.push([]);
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:12},{wch:40},{wch:25},{wch:8}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Timelogg');
  XLSX.writeFile(wb,'timelogg.xlsx');
  showToast('Eksportert til timelogg.xlsx');
});

// ── Import ──
document.getElementById('btn-import-trigger').addEventListener('click',()=>document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      if(imported.timelogg){data=Object.assign({},data,imported.timelogg);if(Array.isArray(imported.lookup)){lookupList=[...new Set([...imported.lookup,...lookupList])];saveLookup();}}
      else data=Object.assign({},data,imported);
      debouncedSave();render();showToast('Importert — '+Object.keys(data).length+' dager');
    }catch{showToast('Feil: ugyldig JSON');}
  };
  reader.readAsText(file);e.target.value='';
});

// ── Auto-eksport ──
function autoExport(){
  if(totalEntries()===0)return;
  const today=new Date().toISOString().slice(0,10);
  const payload=JSON.stringify({timelogg:data,lookup:lookupList},null,2);
  if(localStorage.getItem(AUTO_DAY_KEY)!==today){downloadBlob('timelogg_'+today+'.json',payload,'application/json');localStorage.setItem(AUTO_DAY_KEY,today);}
  downloadBlob('timelogg_alle.json',payload,'application/json');
  localStorage.setItem(AUTO_KEY,Date.now().toString());
}
function checkAutoExport(){if(totalEntries()===0)return;const last=parseInt(localStorage.getItem(AUTO_KEY)||'0');if(Date.now()-last>60*60*1000)autoExport();}
checkAutoExport();
setInterval(checkAutoExport,5*60*1000);

window.addEventListener('resize',render);
render();
</script>
